    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is LinkedIn automation?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "LinkedIn automation is the practice of using software to automate repetitive LinkedIn tasks such as sending connection requests, follow-ups, and direct messages. LinkedIn Copilot is an AI-powered LinkedIn automation tool that goes beyond templates — it reads each prospect's full profile and generates personalized messages using Claude Sonnet, while validating leads against your Ideal Customer Profile using Claude Haiku."
          }
        },
        {
          "@type": "Question",
          "name": "Is LinkedIn automation safe? Will I get banned?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "LinkedIn Copilot is designed with safety as the top priority. It runs as a Chrome Extension in your own browser (no cloud servers or proxy farms), enforces strict daily limits (80 profile visits, 40 connection requests), uses random human-like delays between actions, and includes automatic warm-up for new accounts. These measures keep your activity well within LinkedIn's safe thresholds."
          }
        },
        {
          "@type": "Question",
          "name": "How does LinkedIn Copilot validate leads against my ICP?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "LinkedIn Copilot uses Claude Haiku to automatically enrich every lead with full LinkedIn profile data, then validates them against your Ideal Customer Profile using real headlines, titles, career history, and company data. Leads that don't match your ICP are filtered out before any outreach begins."
          }
        },
        {
          "@type": "Question",
          "name": "How are the LinkedIn messages personalized?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Our AI agents capture full public LinkedIn profile data — experience, education, skills, about section — without using your account. Claude Sonnet then writes a unique message for each prospect, referencing their actual background, career moves, and interests. No templates, no {firstName} placeholders."
          }
        },
        {
          "@type": "Question",
          "name": "How many LinkedIn connection requests can I send per day?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "LinkedIn Copilot enforces a maximum of 40 connection requests and 80 profile visits per day. These limits are well within LinkedIn's safe thresholds and cannot be overridden. New accounts start with lower limits that gradually ramp up over weeks."
          }
        },
        {
          "@type": "Question",
          "name": "Do I need LinkedIn Sales Navigator to use LinkedIn Copilot?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. LinkedIn Copilot works with a free LinkedIn account. Import leads from any source — Sales Navigator, Apollo, Lusha, Instantly — via CSV upload. You don't need Sales Navigator or any other paid tool to find and reach your ideal prospects."
          }
        },
        {
          "@type": "Question",
          "name": "What's the difference between LinkedIn Copilot and other LinkedIn automation tools like Dripify?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Most LinkedIn automation tools like Dripify use simple templates with {firstName} and {companyName} placeholders. LinkedIn Copilot reads the full LinkedIn profile — about section, career history, education, skills — and generates truly personalized messages using Claude Sonnet. It also includes AI-powered ICP validation with Claude Haiku, which filters out bad-fit leads before any outreach begins. You don't need to build complex flows — the AI handles personalization automatically."
          }
        },
        {
          "@type": "Question",
          "name": "How long does it take to set up a LinkedIn outreach campaign?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "You can go from zero to personalized LinkedIn conversations in under 10 minutes. Upload a CSV with LinkedIn URLs, define your ICP criteria, set your message tone, and launch. The Chrome Extension handles profile visits, follows, connection requests, and DMs automatically."
          }
        },
        {
          "@type": "Question",
          "name": "What happens after the free 50 outreach credits?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Your existing leads continue processing through the full outreach sequence — profile visits, follows, connection requests, and DMs. You just can't add new leads until you upgrade to Pro ($147/month for 1,000 outreach credits). No data is lost."
          }
        },
        {
          "@type": "Question",
          "name": "Can I use LinkedIn Copilot for outreach in other languages?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Claude Sonnet detects your prospect's language from their LinkedIn profile and writes messages in that language automatically. Over 30 languages are supported, including Portuguese, French, German, Spanish, and Japanese."
          }
        },
        {
          "@type": "Question",
          "name": "Can I edit the AI-generated LinkedIn messages before sending?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Always. You maintain full control — you can approve, edit, regenerate, or reject any message. Nothing is ever sent without your explicit approval. You can review messages one by one or use batch approval for efficiency."
          }
        },
        {
          "@type": "Question",
          "name": "How does LinkedIn Copilot compare to manual LinkedIn outreach?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Manual LinkedIn outreach typically allows 15-20 personalized messages per day and takes 2-3 hours. LinkedIn Copilot automates the entire sequence — profile visits, follows, connection requests, and personalized DMs — processing up to 40 leads per day with AI-written messages that reference each prospect's actual background. It's faster, more personalized, and safer than doing it manually."
          }
        },
        {
          "@type": "Question",
          "name": "What are Ghost Profiles and why does LinkedIn Copilot skip them?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Ghost profiles are LinkedIn accounts with minimal activity — no about section, few skills, no education, barely any connections. These users rarely check LinkedIn and will never see your connection request or message. LinkedIn Copilot automatically detects and skips ghost profiles so you don't waste credits on people who aren't active on the platform."
          }
        }
      ]
