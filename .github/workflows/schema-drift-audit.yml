name: Schema drift audit

# Runs on every PR and on pushes to main. Dumps the current production schema
# from Supabase via the Management API, then scans every edge function +
# frontend file for column references and fails the build if any reference
# does not exist in the live public schema. This catches the class of silent
# bugs where code references a column that was renamed or deleted
# (e.g. cycle_start_at vs cycle_start_date).
#
# This workflow uses the Supabase Management API rather than a direct Postgres
# connection, so the only secret required is SUPABASE_ACCESS_TOKEN (a personal
# access token starting with sbp_...). No database password needed.

on:
  pull_request:
    paths:
      - "supabase/functions/**"
      - "src/**"
      - "scripts/schema-drift-audit.py"
      - "scripts/dump-schema.py"
      - ".github/workflows/schema-drift-audit.yml"
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
      - "src/**"
      - "scripts/schema-drift-audit.py"
      - "scripts/dump-schema.py"
  workflow_dispatch: {}

jobs:
  audit:
    name: Audit column references
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Dump live schema (via Management API)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN and SUPABASE_PROJECT_REF secrets are required."
            echo "See .github/workflows/schema-drift-audit.yml for setup instructions."
            exit 1
          fi
          python3 scripts/dump-schema.py /tmp/schema.py
          echo "--- schema preview (first 20 lines) ---"
          head -20 /tmp/schema.py

      - name: Run schema drift audit
        env:
          SCHEMA_PATH: /tmp/schema.py
        run: python3 scripts/schema-drift-audit.py
